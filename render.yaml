services:
  # --- Spring Boot Backend ---
  - type: web
    name: my-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile   # Relative to repo root
    dockerContext: backend               # Tells Render to treat the 'backend' folder as the root
    envVars:
      - key: SERVER_PORT
        value: 8080

  # --- TypeScript Frontend (React/Vite) ---
  - type: static
    name: my-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - "frontend/**"
