services:
  # --- Spring Boot Backend ---
  - type: web
    name: my-backend
    rootDir: backend       
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/my-app-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SERVER_PORT
        value: 8080

  # --- TypeScript Frontend (React/Vite) ---
  - type: static
    name: my-frontend
    rootDir: frontend       
    buildCommand: npm install && npm run build
    staticPublishPath: dist 
    buildFilter:
      paths:
        - "frontend/**"     # Only redeploy if files in /frontend change
