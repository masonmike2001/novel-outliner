services:
  # --- Spring Boot Backend ---
  - type: web
    name: my-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SERVER_PORT
        value: 8080

  # --- TypeScript Frontend (React/Vite) ---
  - type: static
    name: my-frontend
    rootDir: frontend/novel-outliner-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
