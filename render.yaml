services:
  # --- Spring Boot Backend ---
  - type: web
    name: my-backend
    rootDir: backend        # Render looks inside here
    runtime: docker
    dockerfilePath: Dockerfile  # Relative to the rootDir (backend/)
    envVars:
      - key: SERVER_PORT
        value: 8080

  # --- TypeScript Frontend (React/Vite) ---
  - type: static
    name: my-frontend
    rootDir: frontend        
    buildCommand: npm install && npm run build
    staticPublishPath: dist 
    buildFilter:
      paths:
        - "frontend/**"
