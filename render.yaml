services:
  # --- Spring Boot Backend ---
  - type: web
    name: my-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile    # Path relative to REPO ROOT
    dockerContext: backend                # Directory containing the source code/files
    envVars:
      - key: SERVER_PORT
        value: 8080

  # --- TypeScript Frontend (React/Vite) ---
  - type: static
    name: my-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - "frontend/**"
